<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Rendez-vous Laboratoire</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Segoe UI',sans-serif;
    background:linear-gradient(135deg,#0f2027,#2c5364);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* CARD */
.container{
    width:460px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(25px);
    padding:35px;
    border-radius:25px;
    box-shadow:0 30px 60px rgba(0,0,0,0.5);
    color:white;
    animation:fadeIn 0.7s ease;
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(40px);}
    to{opacity:1; transform:translateY(0);}
}

/* HEADER */
h2{
    text-align:center;
    margin-bottom:5px;
}

.subtitle{
    text-align:center;
    font-size:13px;
    opacity:0.7;
    margin-bottom:20px;
}

/* INFO */
.info{
    background:linear-gradient(135deg,#00c6ff22,#0072ff22);
    padding:14px;
    border-radius:14px;
    font-size:12px;
    margin-bottom:20px;
    line-height:1.6;
}

/* LABEL */
label{
    font-size:13px;
    opacity:0.8;
}

/* INPUT */
input, select{
    width:100%;
    padding:13px;
    margin:8px 0 15px;
    border-radius:12px;
    border:none;
    outline:none;
    font-size:14px;
    transition:0.3s;
}

/* STYLE */
input{
    background:rgba(255,255,255,0.15);
    color:white;
}

/* 🔥 FIX SELECT VISIBILITÉ */
select{
    background:rgba(255,255,255,0.15);
    color:white;
}

select option{
    color:black;
}

/* FOCUS */
input:focus, select:focus{
    transform:scale(1.02);
    background:rgba(255,255,255,0.25);
}

/* PLACEHOLDER */
input::placeholder{
    color:#ddd;
}

/* NOTE */
.note{
    font-size:11px;
    opacity:0.7;
    margin-top:-10px;
    margin-bottom:10px;
}

/* FILE */
.file{
    background:rgba(255,255,255,0.1);
    padding:10px;
    border-radius:12px;
    cursor:pointer;
}

/* BUTTON */
button{
    width:100%;
    padding:15px;
    border-radius:15px;
    border:none;
    background:linear-gradient(135deg,#0072ff,#00c6ff);
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
    font-weight:bold;
}

button:hover{
    transform:scale(1.05);
    box-shadow:0 15px 35px rgba(0,198,255,0.5);
}

/* ANIMATION INPUT */
input:hover, select:hover{
    background:rgba(255,255,255,0.2);
}

</style>
</head>

<body>

<div class="container">

<h2>📅 Rendez-vous Laboratoire</h2>
<div class="subtitle">Système intelligent automatisé</div>

<div class="info">
📌 Votre rendez-vous sera automatiquement :<br>
• 📅 Le prochain jour ouvrable<br>
• ⏰ Entre <b>08h et 11h</b><br>
• 🔢 Avec un <b>numéro unique</b><br>
• 🚫 Aucun rendez-vous le week-end
</div>

<form method="POST" enctype="multipart/form-data">

<label>Type de patient</label>
<select name="type_patient" required>
<option value="">-- Choisir --</option>
<option>Etudiant</option>
<option>Personnel COUD</option>
<option>Externe</option>
</select>

<label>Nom</label>
<input name="nom" placeholder="Ex: Mbaye" required>

<label>Prénom</label>
<input name="prenom" placeholder="Ex: Abdou" required>

<label>Adresse</label>
<input name="adresse" placeholder="Ex: Dakar">

<label>Téléphone</label>
<input name="telephone" placeholder="Ex: 77 000 00 00" required>

<label>Matricule</label>
<input name="matricule" placeholder="Obligatoire si étudiant / personnel">
<div class="note">* Étudiants et Personnel COUD uniquement</div>

<label>📎 Bulletin d'analyse</label>
<input type="file" name="bulletin" class="file" required>

<button type="submit">🚀 Valider mon rendez-vous</button>

</form>

</div>

</body>
</html>
