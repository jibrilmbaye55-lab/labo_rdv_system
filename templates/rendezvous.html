<!DOCTYPE html>
<html>
<head>
    <title>Rendez-vous Analyse</title>
</head>

<body>

<h2>📅 Prise de rendez-vous</h2>

<form method="POST" action="/submit_rdv" enctype="multipart/form-data">

    <select name="type_patient" required>
        <option value="">Type de patient</option>
        <option>Etudiant</option>
        <option>Personnel COUD</option>
        <option>Externe</option>
    </select>

    <input type="text" name="nom" placeholder="Nom" required>
    <input type="text" name="prenom" placeholder="Prénom" required>
    <input type="text" name="adresse" placeholder="Adresse" required>
    <input type="text" name="telephone" placeholder="Téléphone" required>

    <input type="text" name="matricule" placeholder="Matricule (si étudiant ou personnel)">

    <input type="file" name="bulletin" required>

    <button type="submit">Valider RDV</button>

</form>

</body>
</html>
