<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Réclamation</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI';
    background: linear-gradient(135deg,#0f2027,#2c5364);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* CARD */
.container {
    width: 420px;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(20px);
    padding: 35px;
    border-radius: 20px;
    box-shadow: 0 30px 60px rgba(0,0,0,0.4);
    color: white;
    animation: fadeIn 0.8s ease;
}

@keyframes fadeIn {
    from {opacity:0; transform:translateY(30px);}
    to {opacity:1; transform:translateY(0);}
}

/* TITRE */
h2 {
    text-align: center;
    margin-bottom: 25px;
}

/* INPUT GROUP */
.input-group {
    position: relative;
}

/* INPUTS */
input, textarea, select {
    width: 100%;
    padding: 12px;
    margin: 8px 0 15px;
    border-radius: 12px;
    border: none;
    outline: none;
    background: rgba(255,255,255,0.15);
    color: white;
    font-size: 14px;
    transition: 0.3s;
}

/* FOCUS EFFECT */
input:focus, textarea:focus, select:focus {
    background: rgba(255,255,255,0.25);
    transform: scale(1.02);
}

/* PLACEHOLDER */
input::placeholder,
textarea::placeholder {
    color: #ddd;
}

/* SELECT ICON */
.select-wrapper {
    position: relative;
}

.select-wrapper::after {
    content: "▼";
    position: absolute;
    right: 15px;
    top: 50%;
    transform: translateY(-50%);
    color: #ccc;
    pointer-events: none;
    font-size: 12px;
}

/* FIX OPTIONS */
select option {
    background: white;
    color: black;
}

/* TEXTAREA */
textarea {
    resize: none;
    height: 100px;
}

/* BOUTON */
button {
    width: 100%;
    padding: 14px;
    border-radius: 15px;
    border: none;
    background: linear-gradient(135deg,#ff416c,#ff4b2b);
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
}

/* LABEL */
label {
    font-size: 13px;
    opacity: 0.8;
}

/* MESSAGE ERREUR */
.error {
    color: #ff6b6b;
    font-size: 12px;
    display: none;
    margin-top: -10px;
    margin-bottom: 10px;
}

</style>
</head>

<body>

<div class="container">

<h2>🧾 Réclamation</h2>

<form method="POST" onsubmit="return validateForm()">

<label>Nom</label>
<input id="nom" name="nom" placeholder="Ex: Mbaye">

<label>Téléphone</label>
<input id="tel" name="telephone" placeholder="Ex: 77 000 00 00">

<label>Type de réclamation</label>
<div class="select-wrapper">
<select name="type_reclamation">
    <option value="">Choisir</option>
    <option>Retard</option>
    <option>Résultat incorrect</option>
    <option>Accueil</option>
    <option>Autre</option>
</select>
</div>

<label>Priorité</label>
<div class="select-wrapper">
<select id="priorite" name="priorite">
    <option value="Normal">Normal</option>
    <option value="Urgent">Urgent</option>
</select>
</div>

<div class="error" id="errorMsg">⚠️ Veuillez remplir tous les champs obligatoires</div>

<label>Message</label>
<textarea id="message" name="message" placeholder="Décrivez votre problème..." required></textarea>

<button type="submit">🚀 Envoyer la réclamation</button>

</form>

</div>

<script>
function validateForm() {
    let nom = document.getElementById("nom").value;
    let tel = document.getElementById("tel").value;
    let message = document.getElementById("message").value;

    if (nom === "" || tel === "" || message === "") {
        document.getElementById("errorMsg").style.display = "block";
        return false;
    }

    return true;
}

/* 🔥 Badge automatique URGENT */
document.getElementById("priorite").addEventListener("change", function() {
    if (this.value === "Urgent") {
        this.style.background = "rgba(255,0,0,0.3)";
    } else {
        this.style.background = "rgba(255,255,255,0.15)";
    }
});
</script>

</body>
</html>
