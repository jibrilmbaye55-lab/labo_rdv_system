<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Réclamation envoyée</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI';
    background: linear-gradient(135deg,#0f2027,#2c5364);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.card {
    width: 380px;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(20px);
    padding: 30px;
    border-radius: 20px;
    text-align: center;
    box-shadow: 0 30px 60px rgba(0,0,0,0.4);
    color: white;
    animation: fadeIn 0.8s ease;
}

@keyframes fadeIn {
    from {opacity:0; transform:translateY(30px);}
    to {opacity:1; transform:translateY(0);}
}

.icon {
    font-size: 40px;
    margin-bottom: 15px;
}

h2 {
    color: #00ff9d;
    margin-bottom: 10px;
}

.message {
    font-size: 14px;
    opacity: 0.9;
    margin-bottom: 20px;
}

.info {
    background: rgba(255,255,255,0.1);
    padding: 15px;
    border-radius: 12px;
    margin-bottom: 20px;
}

.btn {
    display: block;
    margin-top: 10px;
    padding: 14px;
    border-radius: 12px;
    text-decoration: none;
    font-weight: bold;
    transition: 0.3s;
}

/* bouton retour */
.btn-home {
    background: white;
    color: #333;
}

/* bouton nouvelle reclamation */
.btn-new {
    background: linear-gradient(135deg,#ff416c,#ff4b2b);
    color: white;
}

.btn:hover {
    transform: scale(1.05);
}
</style>
</head>

<body>

<div class="card">

<div class="icon">✅</div>

<h2>Réclamation envoyée</h2>

<div class="message">
Merci <strong>{{ nom }}</strong>, votre réclamation a été enregistrée avec succès.
</div>

<div class="info">
📩 Notre équipe va analyser votre demande dans les plus brefs délais.<br>
⏱️ Temps de traitement : <strong>24h - 48h</strong>
</div>

<a href="/" class="btn btn-home">🏠 Retour à l'accueil</a>

<a href="/reclamation" class="btn btn-new">🧾 Nouvelle réclamation</a>

</div>

</body>
</html>
